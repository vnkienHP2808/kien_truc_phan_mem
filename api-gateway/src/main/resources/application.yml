server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # customer-service: cổng 8081
            - id: customer-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/khach-hang/**

            # costume-service: cổng 8082
            - id: costume-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/trang-phuc/**

            # order-service: cổng 8083
            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/phieu-thue/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.rental: DEBUG
